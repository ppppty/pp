name: Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build 个人网站
        working-directory: resume
        run: |
          npm ci
          npm run build

      - name: Build 排期系统
        working-directory: paichang-system
        run: |
          npm ci
          npm run build

      - name: Build 营销平台
        working-directory: scenic-marketing-platform
        run: |
          npm ci
          npm run build

      - name: Build 雅思笔记本
        working-directory: ielts-notebook
        run: |
          npm ci
          npm run build

      - name: Assemble deploy directory
        run: |
          mkdir -p _deploy/paichang _deploy/scenic-marketing _deploy/ielts-notebook _deploy/portfolio
          # 个人简历网站 → 根路径
          cp -r resume/dist/* _deploy/
          # Portfolio 个人作品集 → /portfolio/
          cp portfolio.html _deploy/portfolio/index.html
          cp my-photo.jpg my-photo-back.jpg my-photo-about.jpg _deploy/portfolio/ 2>/dev/null || true
          cp social-xhs.jpg social-bili.jpg social-douyin.jpg _deploy/portfolio/ 2>/dev/null || true
          cp ppt-*.pptx _deploy/portfolio/ 2>/dev/null || true
          # 排期系统 → /paichang/
          cp -r paichang-system/dist/* _deploy/paichang/
          # 营销平台 → /scenic-marketing/
          cp -r scenic-marketing-platform/dist/* _deploy/scenic-marketing/
          # 雅思笔记本 → /ielts-notebook/
          cp -r ielts-notebook/dist/* _deploy/ielts-notebook/
          # 保留 1on1.html
          cp 1on1.html _deploy/1on1.html 2>/dev/null || true

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy

      - uses: actions/deploy-pages@v4
        id: deployment
