name: Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build 排期系统
        working-directory: paichang-system
        run: |
          npm ci
          npm run build

      - name: Build 营销平台
        working-directory: scenic-marketing-platform
        run: |
          npm ci
          npm run build

      - name: Assemble deploy directory
        run: |
          mkdir -p _deploy/paichang _deploy/scenic-marketing
          # 排期系统 → 根路径
          cp -r paichang-system/dist/* _deploy/
          # 排期系统 → /paichang/
          cp -r paichang-system/dist/* _deploy/paichang/
          # 营销平台 → /scenic-marketing/
          cp -r scenic-marketing-platform/dist/* _deploy/scenic-marketing/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _deploy

      - uses: actions/deploy-pages@v4
        id: deployment
