name: Deploy 排期系统 to Pages

on:
  push:
    branches: [main]
    paths:
      - 'paichang-system/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-paichang
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: paichang-system/package-lock.json

      - name: Build
        working-directory: paichang-system
        run: |
          npm ci
          npm run build

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: paichang-system/dist

      - uses: actions/deploy-pages@v4
        id: deployment
